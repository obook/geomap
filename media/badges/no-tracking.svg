<svg xmlns="http://www.w3.org/2000/svg" width="124" height="20" role="img" aria-label="No tracking, no logs">
	<title>No tracking, no logs</title>
	<linearGradient id="s" x2="0" y2="100%">
		<stop offset="0" stop-color="#fff" stop-opacity=".12"/>
		<stop offset="1" stop-opacity=".12"/>
	</linearGradient>
	<clipPath id="r"><rect width="124" height="20" rx="3"/></clipPath>
	<g clip-path="url(#r)">
		<rect width="58" height="20" fill="#374151"/>
		<rect x="58" width="66" height="20" fill="#16a34a"/>
		<rect width="124" height="20" fill="url(#s)"/>
	</g>
	<g fill="#ffffff" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="500">
		<text x="29" y="14">Tracking</text>
		<text x="91" y="14">none</text>
	</g>
</svg>
