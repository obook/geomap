<svg xmlns="http://www.w3.org/2000/svg" width="118" height="20" role="img" aria-label="Privacy: GDPR compliant">
	<title>Privacy: GDPR compliant</title>
	<linearGradient id="s" x2="0" y2="100%">
		<stop offset="0" stop-color="#fff" stop-opacity=".12"/>
		<stop offset="1" stop-opacity=".12"/>
	</linearGradient>
	<clipPath id="r"><rect width="118" height="20" rx="3"/></clipPath>
	<g clip-path="url(#r)">
		<rect width="52" height="20" fill="#374151"/>
		<rect x="52" width="66" height="20" fill="#16a34a"/>
		<rect width="118" height="20" fill="url(#s)"/>
	</g>
	<g fill="#ffffff" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="500">
		<text x="26" y="14">Privacy</text>
		<text x="85" y="14">GDPR ready</text>
	</g>
</svg>
