<svg xmlns="http://www.w3.org/2000/svg" width="98" height="20" role="img" aria-label="Status: Active">
	<title>Status: Active</title>
	<linearGradient id="s" x2="0" y2="100%">
		<stop offset="0" stop-color="#fff" stop-opacity=".12"/>
		<stop offset="1" stop-opacity=".12"/>
	</linearGradient>
	<clipPath id="r"><rect width="98" height="20" rx="3"/></clipPath>
