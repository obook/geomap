<div class="page" data-name="messages">
	<div class="navbar">
		<div class="navbar-bg"></div>
		<div class="navbar-inner">
			<div class="left"><a href="#" class="link back"><i class="icon icon-back"></i><span>BACK</span></a></div>
			<div class="title">SEND INTEL</div>
		</div>
	</div>
	<div class="page-content">
		<div class="block">
			<div style="font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--cyan-dim); margin-bottom:12px;">// COMPOSE TRANSMISSION</div>
			<div class="list inline-labels no-hairlines-md" style="margin:0;">
				<ul>
					<li class="item-content item-input">
						<div class="item-inner">
							<div class="item-input-wrap">
								<input type="text" id="text-id" value="" maxlength="24" placeholder="Enter message..." />
							</div>
						</div>
					</li>
				</ul>
			</div>
			<a href="#" class="button button-fill color-green back" id="submit_message-id" style="margin-top:12px; width:100%;">TRANSMIT</a>
		</div>

		<div class="block">
			<div style="font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--text-ghost); margin-bottom:12px;">// QUICK CODES</div>
			<div class="row" style="gap:8px;">
				<a href="#" class="button button-outline col back" id="button-hello-id">SALUT</a>
				<a href="#" class="button button-outline col back" id="button-busy-id">BUSY</a>
				<a href="#" class="button button-outline col back" id="button-later-id">BRB</a>
				<a href="#" class="button button-outline col back" id="button-bye-id">OUT</a>
			</div>
		</div>
	</div>

	<script type="text/javascript">
		jQuery(document).off('click', '#submit_message-id').on('click', '#submit_message-id', function() {
			var message = jQuery('#text-id').val();
			SendMessage(message);
			jQuery('#text-id').val('');
		});

		jQuery(document).off('click', '#button-hello-id').on('click', '#button-hello-id', function() {
			SendMessage('Bonjour à tous.');
		});

		jQuery(document).off('click', '#button-busy-id').on('click', '#button-busy-id', function() {
			SendMessage('Je suis occupé.');
		});

		jQuery(document).off('click', '#button-later-id').on('click', '#button-later-id', function() {
			SendMessage('Je reviens plus tard.');
		});

		jQuery(document).off('click', '#button-bye-id').on('click', '#button-bye-id', function() {
			SendMessage('au revoir.');
		});
	</script>
</div>
