<div class="page" data-name="messages">
	<div class="navbar">
		<div class="navbar-bg"></div>
		<div class="navbar-inner">
			<div class="left"><a href="#" class="link back"><i class="icon icon-back"></i><span data-i18n="common.back">BACK</span></a></div>
			<div class="title" data-i18n="messages.title">SEND INTEL</div>
		</div>
	</div>
	<div class="page-content">
		<div class="block">
			<div style="font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--cyan-dim); margin-bottom:12px;" data-i18n="messages.compose_label">// COMPOSE TRANSMISSION</div>
			<div class="list inline-labels no-hairlines-md" style="margin:0;">
				<ul>
					<li class="item-content item-input">
						<div class="item-inner">
							<div class="item-input-wrap">
								<input type="text" id="text-id" value="" maxlength="24" placeholder="Enter message..." data-i18n="[placeholder]messages.input_placeholder" />
							</div>
						</div>
					</li>
				</ul>
			</div>
			<a href="#" class="button button-fill color-green" id="submit_message-id" style="margin-top:12px; width:100%;" data-i18n="messages.transmit">TRANSMIT</a>
		</div>

		<div class="block">
			<div style="font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--text-ghost); margin-bottom:12px;" data-i18n="messages.quick_codes_label">// QUICK CODES</div>
			<div class="row" style="gap:8px;">
				<a href="#" class="button button-outline col back" id="button-hello-id" data-i18n="messages.quick_hello">SALUT</a>
				<a href="#" class="button button-outline col back" id="button-busy-id" data-i18n="messages.quick_busy">BUSY</a>
				<a href="#" class="button button-outline col back" id="button-later-id" data-i18n="messages.quick_later">BRB</a>
				<a href="#" class="button button-outline col back" id="button-bye-id" data-i18n="messages.quick_bye">OUT</a>
			</div>
		</div>
	</div>

</div>
