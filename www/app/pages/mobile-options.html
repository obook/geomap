<div class="page" data-name="options">
	<div class="navbar">
		<div class="navbar-bg"></div>
		<div class="navbar-inner">
			<div class="left"><a href="#" class="link back"><i class="icon icon-back"></i><span data-i18n="common.back">BACK</span></a></div>
			<div class="title" data-i18n="options.title">COMMS CONFIG</div>
		</div>
	</div>
	<div class="page-content">
		<div class="block">
			<div style="font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--cyan-dim); margin-bottom:16px;" data-i18n="options.params_label">// SYSTEM PARAMETERS</div>
		</div>
		<div class="list inline-labels" style="margin:0;">
			<ul>
				<li class="item-content item-input">
					<div class="item-inner">
						<div class="item-title item-label" data-i18n="options.net_delay">NET DELAY</div>
						<div class="item-input-wrap">
							<input type="range" id="slider-network-id" min="15" max="120" value="30" step="5" />
								<span id="slider-network-value" style="font-family:var(--font-mono); font-size:11px; color:var(--cyan); min-width:40px; text-align:right;"></span>
						</div>
					</div>
				</li>
				<li class="item-content item-input">
					<div class="item-inner">
						<div class="item-title item-label" data-i18n="options.audio">AUDIO</div>
						<div class="item-input-wrap">
							<select id="flipsound-id">
								<option value="off" data-i18n="options.silent">SILENT</option>
								<option value="on" selected data-i18n="options.active">ACTIVE</option>
							</select>
						</div>
					</div>
				</li>
				<li class="item-content item-input">
					<div class="item-inner">
						<div class="item-title item-label" data-i18n="options.language">LANGUAGE</div>
						<div class="item-input-wrap">
							<select id="lang-select-id">
								<option value="auto" data-i18n="options.lang_auto">Auto</option>
								<option value="en" data-i18n="options.lang_en">English</option>
								<option value="fr" data-i18n="options.lang_fr">Francais</option>
							</select>
						</div>
					</div>
				</li>
			</ul>
		</div>
	</div>

</div>
