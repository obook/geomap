<div class="page" data-name="options">
	<div class="navbar">
		<div class="navbar-bg"></div>
		<div class="navbar-inner">
			<div class="left"><a href="#" class="link back"><i class="icon icon-back"></i><span>BACK</span></a></div>
			<div class="title">COMMS CONFIG</div>
		</div>
	</div>
	<div class="page-content">
		<div class="block">
			<div style="font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--cyan-dim); margin-bottom:16px;">// SYSTEM PARAMETERS</div>
		</div>
		<div class="list inline-labels" style="margin:0;">
			<ul>
				<li class="item-content item-input">
					<div class="item-inner">
						<div class="item-title item-label">NET DELAY</div>
						<div class="item-input-wrap">
							<input type="range" id="slider-network-id" min="10" max="60" value="30" />
						</div>
					</div>
				</li>
				<li class="item-content item-input">
					<div class="item-inner">
						<div class="item-title item-label">AUDIO</div>
						<div class="item-input-wrap">
							<select id="flipsound-id">
								<option value="off">SILENT</option>
								<option value="on" selected>ACTIVE</option>
							</select>
						</div>
					</div>
				</li>
			</ul>
		</div>
	</div>

	<script type="text/javascript">
		app.on('pageAfterIn', function(page) {
			if( page.name !== 'options' ) return;
			jQuery('#slider-network-id').val( get_netdelay() );
			jQuery('#flipsound-id').val( get_sound() );
		});

		app.on('pageBeforeOut', function(page) {
			if( page.name !== 'options' ) return;

			var netdelay = jQuery('#slider-network-id').val();
			var sound = jQuery('#flipsound-id').val();

			if( netdelay < 10 ) netdelay = 10;

			set_netdelay(netdelay);
			if( geomap != null ) geomap.SetNetworkDelay(netdelay);

			set_sound(sound);
			GLOBAL_PLAY_SOUNDS = sound;
			if( geomap != null ) geomap.SetSoundsOffOn(sound);

			if( GLOBAL_PLAY_SOUNDS == 'on' )
			{
				soundManager.play('player_dong_id');
			}
		});
	</script>
</div>
