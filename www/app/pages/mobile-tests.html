<div class="page" data-name="tests">
	<div class="navbar">
		<div class="navbar-bg"></div>
		<div class="navbar-inner">
			<div class="left"><a href="#" class="link back"><i class="icon icon-back"></i><span>BACK</span></a></div>
			<div class="title"><span id="debug-play-message-id">DIAGNOSTICS</span></div>
		</div>
	</div>
	<div class="page-content">
		<div class="block">
			<div style="font-family:var(--font-mono); font-size:9px; letter-spacing:3px; color:var(--cyan-dim); margin-bottom:16px;">// AUDIO SUBSYSTEM TEST</div>
			<a href="#" id="tests-play-sound-id" class="button button-fill" style="margin-bottom:10px; width:100%;">TEST OGG CODEC</a>
			<a href="#" id="tests-play-sound-id-wav" class="button button-fill" style="margin-bottom:10px; width:100%;">TEST WAV CODEC</a>
			<a href="#" id="tests-play-sound-id-mp3" class="button button-fill" style="width:100%;">TEST MP3 CODEC</a>
		</div>
	</div>

	<script type="text/javascript">
		jQuery(document).off('click', '#tests-play-sound-id').on('click', '#tests-play-sound-id', function() {
			soundManager.play('player_digital_beep_id');
			jQuery('#debug-play-message-id').html('OGG // OK');
		});

		jQuery(document).off('click', '#tests-play-sound-id-wav').on('click', '#tests-play-sound-id-wav', function() {
			soundManager.play('player_digital_beep_id_wav');
			jQuery('#debug-play-message-id').html('WAV // OK');
		});

		jQuery(document).off('click', '#tests-play-sound-id-mp3').on('click', '#tests-play-sound-id-mp3', function() {
			soundManager.play('player_digital_beep_id_mp3');
			jQuery('#debug-play-message-id').html('MP3 // OK');
		});
	</script>
</div>
