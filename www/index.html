<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-type" content="text/html; charset=utf-8" />
	<meta name="format-detection" content="telephone=no" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />

	<link rel="icon" type="image/x-icon" href="favicon.ico" />
	<link rel='shortcut icon' type='image/x-icon' href='favicon.ico' />

	<!-- Theme (split by concern, each file < 200 lines) -->
	<link rel="stylesheet" href="app/css/theme/variables.css" />
	<link rel="stylesheet" href="app/css/theme/base.css" />
	<link rel="stylesheet" href="app/css/theme/page-navbar.css" />
	<link rel="stylesheet" href="app/css/theme/toolbar.css" />
	<link rel="stylesheet" href="app/css/theme/buttons.css" />
	<link rel="stylesheet" href="app/css/theme/forms.css" />
	<link rel="stylesheet" href="app/css/theme/popup.css" />
	<link rel="stylesheet" href="app/css/theme/data-display.css" />
	<link rel="stylesheet" href="app/css/theme/leaflet.css" />
	<link rel="stylesheet" href="app/css/theme/hud-icons.css" />

	<!-- Framework7 -->
	<link rel="stylesheet" href="vendor/framework7/framework7-bundle.min.css" />

	<!-- Font Awesome -->
	<link rel="stylesheet" href="vendor/font-awesome/css/font-awesome.min.css">

	<!-- Leaflet -->
	<link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
	<link rel="stylesheet" href="vendor/leaflet/leaflet.label.css" />
	<link rel="stylesheet" href="vendor/leaflet/leaflet.awesome-markers.css">
	<link rel="stylesheet" href="vendor/leaflet/MarkerCluster.css" />
	<link rel="stylesheet" href="vendor/leaflet/MarkerCluster.Default.css" />
	<link rel="stylesheet" href="vendor/leaflet/leaflet.draw.css" />
	<link rel="stylesheet" href="vendor/leaflet/l.geosearch.css" />

	<!-- Apple meta -->
	<meta name="HandheldFriendly" content="True">
	<meta name="MobileOptimized" content="320"/>
	<link rel="apple-touch-icon-precomposed" href="app/images/favicon.png">
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" type='image/png' href="app/images/geomap.png">

	<!-- Layout -->
	<link rel="stylesheet" href="app/css/layout.css" />

	<title>GeoMap</title>
</head>
<body>

	<div id="app">

		<!-- Home page -->
		<div class="view view-main view-init safe-areas" data-url="/">

				<!-- HOME PAGE -->
				<div class="page" data-name="home">
					<div class="navbar">
						<div class="navbar-bg"></div>
						<div class="navbar-inner">
							<div class="left"><a href="/about/" class="link" data-i18n="home.intel_link">About</a></div>
							<div class="title">GeoMap</div>
						</div>
					</div>
					<div class="page-content" style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px 16px;">
						<div class="classified-frame" style="width:100%; max-width:420px;">
							<div style="text-align:center; margin-bottom:24px;">
								<div style="font-size:26px; font-weight:600; letter-spacing:-0.01em; color:var(--text-primary);">GeoMap</div>
								<div style="font-size:13px; color:var(--text-secondary); margin-top:4px;" data-i18n="home.title_sub">Real-time location sharing</div>
							</div>
							<div class="list inline-labels no-hairlines-md" style="margin:0;">
								<ul>
									<li class="item-content item-input">
										<div class="item-inner">
											<div class="item-title item-label" data-i18n="home.callsign_label">Username</div>
											<div class="item-input-wrap" style="display:flex; align-items:center; gap:8px;">
												<input type="text" id="username-id" value="NEWBIE" maxlength="8" placeholder="Pick a name" data-i18n="[placeholder]home.callsign_placeholder" style="flex:1;" />
												<a href="#" id="random-callsign-id" title="Generate a random username" aria-label="Generate a random username">&#x21bb;</a>
											</div>
										</div>
									</li>
									<li class="item-content item-input">
										<div class="item-inner">
											<div class="item-title item-label" data-i18n="home.channel_label">Channel</div>
											<div class="item-input-wrap">
												<input type="number" id="select-choice-mission-id" value="1111" min="1111" max="99999" placeholder="1111 - 99999" data-i18n="[placeholder]home.channel_placeholder" />
											</div>
										</div>
									</li>
									<li class="item-content item-input">
										<div class="item-inner">
											<div class="item-title item-label" data-i18n="home.server_label">Server</div>
											<div class="item-input-wrap">
												<input type="text" id="server-url-id" value="" placeholder="https://example.com/server-php" />
											</div>
										</div>
									</li>
								</ul>
							</div>
							<div style="margin-top:18px;">
								<a href="/map/" class="button button-fill button-large color-green disabled" id="submit-id" style="width:100%;">
									<span id="blinker-id" data-i18n="home.engage_button">Connect</span>
								</a>
							</div>
							<div style="text-align:center; margin-top:18px;">
								<span style="font-size:12px; color:var(--text-tertiary);" data-i18n="home.footer">No account. No tracking. No logs.</span>
							</div>
						</div>
					</div>
				</div>

		</div>
	</div>

	<!-- jQuery -->
	<script src="vendor/jquery/jquery-1.9.1.min.js"></script>

	<!-- Leaflet -->
	<script src="vendor/leaflet/leaflet.js"></script>
	<script src="vendor/leaflet/leaflet.label.js"></script>
	<script src="vendor/leaflet/leaflet.markercluster.js"></script>
	<script src="vendor/leaflet/leaflet.awesome-markers.js"></script>
	<script src="vendor/leaflet/leaflet.draw.js"></script>
	<script src="vendor/leaflet/gpx.js"></script>
	<script src="vendor/leaflet/l.control.geosearch.js"></script>
	<script src="vendor/leaflet/l.geosearch.provider.openstreetmap.js"></script>
	<script src="vendor/leaflet/tile.stamen.js"></script>
	<script src="vendor/leaflet/oms.min.js"></script>

	<!-- Sound Manager -->
	<script type="text/javascript" charset="utf-8" src="vendor/soundmanager/script/soundmanager2.js"></script>

	<!-- QR Code -->
	<script type="text/javascript" src="vendor/qrcode.min.js"></script>

	<!-- Framework7 -->
	<script src="vendor/framework7/framework7-bundle.min.js"></script>

	<!-- Geomap -->
	<script type="text/javascript" charset="utf-8" src="app/js/loader.js"></script>
	<script type="text/javascript" charset="utf-8" src="app/js/ui/home.js"></script>

	<script type="text/javascript">

	var app = new Framework7({
		el: '#app',
		name: 'GeoMap',
		theme: 'auto',
		darkMode: true,
		routes: [
			{
				path: '/',
				pageName: 'home'
			},
			{
				path: '/map/',
				pageName: 'map',
				keepAlive: true,
				on: {
					pageInit: function(e, page) {
						console.log("#map pageInit");
						get_storage();
						geometrychanged();
					},
					pageBeforeIn: function(e, page) {
						console.log("#map pageBeforeIn");
						get_storage();
						document.title = username + '@' + team;
						geometrychanged();
					},
					pageAfterIn: function(e, page) {
						if( geomap != null )
						{
							console.log("[GeoMap] Map resume");
							var map = geomap.GetMap();
							if( map ) map.invalidateSize();
						}
						else
						{
							console.log("[GeoMap] Map create");
							var mapCanvas = document.getElementById('map_canvas');
							if( mapCanvas ) { mapCanvas.innerHTML = ''; delete mapCanvas._leaflet_id; }
							geomap = new Class_GeoMap("map_canvas", GLOBAL_SERVER);
							geomap.SetNetworkDelay(get_netdelay());
							geomap.SetSoundsOffOn(get_sound());
							geomap.start(team, handle, username);
						}
						jQuery('#map_title_id').html(username + '@' + team);
						geometrychanged();
						/* Recalculer après le rendu complet */
						setTimeout(geometrychanged, 100);
						setTimeout(geometrychanged, 500);
					}
				}
			},
			{
				path: '/about/',
				url: './app/pages/about.html'
			},
			{
				path: '/menu/',
				url: './app/pages/menu.html'
			},
			{
				path: '/options/',
				url: './app/pages/options.html'
			},
			{
				path: '/messages/',
				url: './app/pages/messages.html'
			},
			{
				path: '/connected/',
				url: './app/pages/connected.html'
			},
			{
				path: '/share/',
				url: './app/pages/share.html'
			}
		],
		on: {
			init: function() {
				console.log('Framework7 initialized');
				I18n.init();
				get_storage();
				/* Check URL parameters ?server=&channel= */
				var params = new URLSearchParams(window.location.search);
				var urlServer = params.get('server');
				var urlChannel = params.get('channel');
				if(urlServer) {
					set_server(urlServer);
					GLOBAL_SERVER = urlServer;
				}
				if(urlChannel) {
					set_channel(urlChannel);
				}
				jQuery('#username-id').val( get_username() );
				jQuery('#select-choice-mission-id').val( get_channel() );
				var sv = get_server();
				jQuery('#server-url-id').val( (sv === '.') ? '' : sv );
				validateEngageButton();
			}
		}
	});

	/* Re-apply translations whenever a Framework7 page is rendered. Static
	 * pages (*.html templates) carry data-i18n attributes that need
	 * to be processed each time they enter the DOM. */
	app.on('pageBeforeIn pageInit', function(page) {
		if (typeof I18n !== 'undefined' && page && page.el) {
			I18n.applyTo(page.el);
		}
	});

	var mainView = app.views.main;

	/* Page HOME events */
	function get_server_display() {
		var s = get_server();
		return (s === '.') ? '' : s;
	}

	function validateEngageButton() {
		var u = jQuery('#username-id').val().trim();
		var c = jQuery('#select-choice-mission-id').val().trim();
		var s = jQuery('#server-url-id').val().trim();
		if(u !== '' && c !== '' && s !== '') {
			jQuery('#submit-id').removeClass('disabled');
		} else {
			jQuery('#submit-id').addClass('disabled');
		}
	}

	app.on('pageInit', function(page) {
		if( page.name === 'home' )
		{
			jQuery('#username-id').val( get_username() );
			jQuery('#select-choice-mission-id').val( get_channel() );
			jQuery('#server-url-id').val( get_server_display() );
			validateEngageButton();
		}
	});

	app.on('pageAfterIn', function(page) {
		if( page.name === 'home' )
		{
			jQuery('#username-id').val( get_username() );
			jQuery('#select-choice-mission-id').val( get_channel() );
			jQuery('#server-url-id').val( get_server_display() );
			validateEngageButton();
		}
	});

	jQuery(document).on('input', '#username-id, #select-choice-mission-id, #server-url-id', validateEngageButton);

	jQuery(document).on('click', '#random-callsign-id', function(e) {
		e.preventDefault();
		var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
		var name = '';
		for(var i = 0; i < 4; i++) name += chars.charAt(Math.floor(Math.random() * chars.length));
		jQuery('#username-id').val(name);
		validateEngageButton();
	});

	jQuery(document).on('click', '#submit-id', function() {
		username = jQuery('#username-id').val().trim();
		team = jQuery('#select-choice-mission-id').val().trim();
		var serverUrl = jQuery('#server-url-id').val().trim().replace(/\/+$/, '');
		if(username == '') username = 'NEWBIE';
		if(team == '') team = '1234';
		if(serverUrl == '') serverUrl = '.';
		set_username(username);
		set_channel(team);
		set_server(serverUrl);
		GLOBAL_SERVER = serverUrl;
		if(typeof soundManager !== 'undefined') soundManager.play('player_digital_beep_id');

		/* Trigger the geolocation permission prompt while we are still inside
		 * the ENGAGE click handler. iOS Safari only reliably shows the prompt
		 * when the call is made within an active user-gesture context. The
		 * navigation to /map/ happens immediately via the link href, so the
		 * success callback may resolve after Class_GeoMap is constructed: in
		 * that case Class_GPS.private_center_on_first_fix takes over the
		 * initial map centering on the next watchPosition update. */
		if (navigator.geolocation) {
			navigator.geolocation.getCurrentPosition(
				function(pos) {
					gps_lastposition_status = STATE_POSITION_OK;
					gps_lastposition_latitude = pos.coords.latitude;
					gps_lastposition_longitude = pos.coords.longitude;
					gps_lastposition_accuracy = pos.coords.accuracy;
					gps_lastposition_speed = pos.coords.speed;
					gps_lastposition_altitude = pos.coords.altitude;
					gps_lastposition_altitudeAccuracy = pos.coords.altitudeAccuracy;
					gps_lastposition_heading = pos.coords.heading;
					gps_lastposition_date = new Date();
					console.log('[GeoMap] Pre-engage GPS fix: lat=' + pos.coords.latitude + ' lon=' + pos.coords.longitude);
				},
				function(err) {
					console.warn('[GeoMap] Pre-engage geolocation failed: code=' + err.code + ' msg=' + err.message);
				},
				{ maximumAge: 0, enableHighAccuracy: true, timeout: 30000 }
			);
		}
	});

	/* MAP page template (injected dynamically) */
	var mapPageTemplate = '\
	<div class="page" data-name="map">\
		<div class="navbar navbar-geomap">\
			<div class="navbar-bg"></div>\
			<div class="navbar-inner">\
				<div class="left"><a href="/menu/" class="link"><span class="status-dot active"></span><span id="map_title_id"></span></a></div>\
				<div class="title"><span id="gps_state_label" data-i18n="gps.wait">GPS WAIT</span></div>\
				<div class="right">\
					<a href="#" class="link" id="btn-users" data-i18n="[title]map.btn_users_title" title="Zoom on all users">\
						<span id="usersnumbers">---</span>\
					</a>\
					<a href="#" class="link" id="button_GPS" data-i18n="[title]map.btn_gps_title" title="Zoom on me">\
						<i class="toolbar-icon icon-gps-error"></i>\
					</a>\
					<a href="#" class="link" id="button_network" data-i18n="[title]map.btn_network_title" title="Clear messages">\
						<i class="toolbar-icon icon-data-error"></i>\
					</a>\
				</div>\
			</div>\
		</div>\
		<div class="page-content" style="padding:0; overflow:visible !important; position:relative;">\
			<div id="messages_toolbar"><span id="messages_id"></span></div>\
			<div id="map_canvas"></div>\
		</div>\
		<div class="toolbar toolbar-bottom">\
			<div class="toolbar-inner">\
				<span id="map_speed_id" role="button" tabindex="0" data-i18n="[aria-label]map.help_aria; [title]map.help_title" aria-label="Open help" title="Help">GeoMap</span>\
			</div>\
		</div>\
	</div>';

	/* Inject map page template */
	app.on('pageBeforeIn', function(page) {
		if( page.name === 'map' )
		{
			/* Ensure template is there */
		}
	});

	/* Register the map page as a component route */
	app.routes[1].content = mapPageTemplate;

	/* Geometry helper : map_canvas remplit tout le .page-content */
	function geometrychanged()
	{
		var mapCanvas = document.getElementById('map_canvas');
		if( !mapCanvas ) return;

		var pageContent = mapCanvas.parentElement;
		if( !pageContent ) return;

		/* .page-content est déjà dimensionné par Framework7 (navbar + toolbar déduits) */
		var h = pageContent.clientHeight;
		mapCanvas.style.height = h + 'px';
		mapCanvas.style.width = '100%';

		/* Forcer Leaflet à recalculer sa taille */
		if( geomap != null )
		{
			var map = geomap.GetMap();
			if( map ) map.invalidateSize();
		}

		console.log("geometrychanged: map_canvas=" + mapCanvas.style.width + " x " + h + "px");
	}

	window.addEventListener('resize', geometrychanged);
	window.addEventListener('orientationchange', geometrychanged);

	/* Toolbar button actions */
	jQuery(document).on('click', '#btn-users', function() { ZoomToFitAllMarkers(); });
	jQuery(document).on('click', '#button_GPS', function() { ZoomToUserMarker(); });
	jQuery(document).on('click', '#button_network', function() { CleanUpMessage(); });

	/* Help popup. Title, close label, and section content come from the
	 * shared I18n dictionary so a single source of truth covers EN and FR. */
	function buildHelpPopupHtml() {
		var sections = (GEOMAP_I18N[GEOMAP_LANG] && GEOMAP_I18N[GEOMAP_LANG].help && GEOMAP_I18N[GEOMAP_LANG].help.sections)
			|| GEOMAP_I18N.en.help.sections;
		var html = '<div class="popup" id="help-popup-inst">';
		html += '<div class="view">';
		html += '<div class="page">';
		html += '<div class="navbar"><div class="navbar-bg"></div><div class="navbar-inner">';
		html += '<div class="title">' + I18n.t('help.title') + '</div>';
		html += '<div class="right"><a href="#" class="link popup-close">' + I18n.t('common.close') + '</a></div>';
		html += '</div></div>';
		html += '<div class="page-content">';
		html += '<div class="block">';
		for (var i = 0; i < sections.length; i++) {
			html += '<h3>' + sections[i].h + '</h3>';
			html += '<p>' + sections[i].p + '</p>';
		}
		html += '</div>';
		html += '</div>';
		html += '</div>';
		html += '</div>';
		html += '</div>';
		return html;
	}

	jQuery(document).on('click', '#map_speed_id', function(e) {
		e.preventDefault();
		var popup = app.popup.create({
			content: buildHelpPopupHtml(),
			on: {
				closed: function(p) { p.destroy(); }
			}
		});
		popup.open();
	});

	/* Message actions */
	jQuery(document).on('click', '#submit_message-id', function() {
		var message = jQuery('#text-id').val();
		if(message != '') { SendMessage(message); jQuery('#text-id').val(''); }
		app.views.main.router.back('/map/', { force: true });
	});
	jQuery(document).on('click', '#button-hello-id', function() { SendMessage(t('messages.quick_hello_msg')); });
	jQuery(document).on('click', '#button-busy-id', function() { SendMessage(t('messages.quick_busy_msg')); });
	jQuery(document).on('click', '#button-later-id', function() { SendMessage(t('messages.quick_later_msg')); });
	jQuery(document).on('click', '#button-bye-id', function() { SendMessage(t('messages.quick_bye_msg')); });

	/* Field agents (connected users list) */
	app.on('pageAfterIn', function(page) {
		if( page.name !== 'connected' ) return;
		jQuery('#userlist-listview-id').html('');
		if( geomap != null ) geomap.PrintUserlist('#userlist-listview-id');
	});

	/* Options page */
	app.on('pageAfterIn', function(page) {
		if( page.name !== 'options' ) return;
		jQuery('#slider-network-id').val( get_netdelay() );
		jQuery('#slider-network-value').text( get_netdelay() + 's' );
		jQuery('#flipsound-id').val( get_sound() );
		jQuery('#lang-select-id').val( I18n.getStored() );
	});
	jQuery(document).on('input', '#slider-network-id', function() {
		jQuery('#slider-network-value').text( jQuery(this).val() + 's' );
	});
	jQuery(document).on('change', '#lang-select-id', function() {
		I18n.setLang( jQuery(this).val() );
	});
	app.on('pageBeforeOut', function(page) {
		if( page.name !== 'options' ) return;
		var netdelay = jQuery('#slider-network-id').val();
		var sound = jQuery('#flipsound-id').val();
		if( netdelay < 15 ) netdelay = 15;
		set_netdelay(netdelay);
		if( geomap != null ) geomap.SetNetworkDelay(netdelay);
		set_sound(sound);
		GLOBAL_PLAY_SOUNDS = sound;
		if( geomap != null ) geomap.SetSoundsOffOn(sound);
		if( GLOBAL_PLAY_SOUNDS == 'on' ) soundManager.play('player_dong_id');
	});

	/* Share coords page */
	app.on('pageAfterIn', function(page) {
		if( page.name !== 'share' ) return;
		var sv = get_server();
		var ch = get_channel();
		var url = window.location.origin + window.location.pathname;
		var sep = '?';
		if(sv && sv !== '.') { url += sep + 'server=' + encodeURIComponent(sv); sep = '&'; }
		if(ch) { url += sep + 'channel=' + encodeURIComponent(ch); }
		jQuery('#share-url-link').attr('href', url).text(decodeURIComponent(url));
		jQuery('#share-qrcode').empty();
		new QRCode(document.getElementById('share-qrcode'), {
			text: url,
			width: 200,
			height: 200,
			colorDark: '#000000',
			colorLight: '#ffffff',
			correctLevel: QRCode.CorrectLevel.M
		});
	});

	/* Abort mission - stop map and return to home */
	jQuery(document).on('click', '#quit_map-id', function(e) {
		e.preventDefault();
		if( geomap != null )
		{
			geomap.logout();
			geomap.destroy();
		}
		geomap = null;
		window.location.hash = '';
		window.location.reload();
	});

	function ZoomToFitAllMarkers()
	{
		if( geomap != null ) geomap.ZoomToFitAllMarkers();
	}

	function ZoomToUserMarker()
	{
		if( geomap != null ) geomap.ZoomToUserMarker();
	}

	function CleanUpMessage()
	{
		if( geomap != null ) geomap.CleanUpMessage();
		if( typeof app !== 'undefined' ) app.toast.create({ text: t('messages.cleared_toast'), closeTimeout: 2000 }).open();
	}

	function toast(message)
	{
		if( typeof app !== 'undefined' ) app.toast.create({ text: message, closeTimeout: 2000 }).open();
	}

	</script>

</body>
</html>
